<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>wuyixiang-Profile</title>
  <style>
    .fixed-box
    {
      width: auto;
      height: auto;
      position: fixed;
      top: 10px;
      right: 50px;
      text-align: right;
      font-size: 16px;
    }
    #logoutBtn
    {
      background: transparent;
      border: none;
      color: black;
      text-decoration: underline;
      cursor: pointer;
      font-size: 16px; 
      padding: 0 0 0 6px; 
      display: inline;
    }
    #logoutBtn:hover
    {
      color: darkred;
    }
    .separator
    {
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <div id="displayArea" class="fixed-box">
    <span id="nicknameDisplay"></span>
    <span class="separator">|</span>
    <button id="logoutBtn">Log out</button>
  </div>
  <p>
    <h3><a href="https://www.luogu.com.cn/user/703022">wuyixiang 的网站</a></h3><br>
    <!--<img src="LO3yn.gif" alt="hyw"><br>-->
    This guy is too lazy that he didn't leave anything.
  </p>
  Want to Login? <a href="/login">Click</a> here.
  <script>
    window.addEventListener('DOMContentLoaded', function()
    {
        const savedNickname = localStorage.getItem('userNickname');
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const separator = document.querySelector('.separator');
        if(savedNickname)
        {
            nicknameDisplay.textContent = savedNickname;
            logoutBtn.style.display = 'inline';
            separator.style.display = 'inline';
            console.log('changed:', savedNickname);
        }
        else
        {
            nicknameDisplay.textContent = 'Anonymous';
            logoutBtn.style.display = 'none';
            separator.style.display = 'none';
        }
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('userNickname');
            window.location.reload();
        });
    });
  </script>
</body>
</html>
