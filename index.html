<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>wuyixiang-Profile</title>
  <style>
    .fixed-box {
      width: auto;
      height: auto;
      position: fixed;
      top: 10px;
      right: 50px;
      text-align: right;
    }
    #logoutBtn {
      background: transparent;
      border: none;
      color: black;
      text-decoration: underline;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      display: block;
      margin-top: 5px; 
    }
  </style>
</head>
<body>

  <div id="displayArea" class="fixed-box">
    <span id="nicknameDisplay"></span>
    <button id="logoutBtn">Log out</button>
  </div>

  <p>
    <h3><a href="https://www.luogu.com.cn/user/703022">wuyixiang 的网站</a></h3><br>
    <!--<img src="LO3yn.gif" alt="hyw"><br>-->
    This guy is too lazy that he didn't leave anything.
  </p>
  Want to Login? <a href="/login">Click</a> here.
  <script>
    window.addEventListener('DOMContentLoaded', function()
    {
        const savedNickname = localStorage.getItem('userNickname');
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        if (savedNickname)
        {
            nicknameDisplay.textContent = savedNickname; 
            logoutBtn.style.display = 'inline-block';
            console.log('已显示昵称：', savedNickname);
        } 
        else 
        {
            nicknameDisplay.textContent = 'Anonymous';
            logoutBtn.style.display = 'none';
        }
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('userNickname');
            window.location.reload();
        });
    });
  </script>
</body>
</html>
